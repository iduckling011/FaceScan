<div class="bg"></div>
<div class="bg bg2"></div>
<div class="bg bg3"></div>

<ion-content class="auth-bg">
  <div class="auth-container fade-in">
    
    <div class="logo-container">
      <img src="assets/adanlogo.png" alt="Logo" class="main-logo">
      <h1>AppFacialADL</h1>
    </div>

    <form [formGroup]="loginForm">
      <ion-card class="glass-card">
        <ion-card-content>

          <!-- CONTENEDOR DE LA CÁMARA -->
          <div [hidden]="!mostrandoCamara" class="camera-container" style="position: relative; margin-bottom: 20px; border-radius: 15px; overflow: hidden; display: flex; justify-content: center;">
            <video #videoElement autoplay muted playsinline style="width: 100%; max-width: 300px; border-radius: 15px;"></video>
            <canvas #canvasElement style="position: absolute; top: 0; left: 0;"></canvas>
          </div>
          
          <ion-text color="medium" class="ion-text-center" *ngIf="cargandoModelos">
            <p><ion-spinner name="crescent"></ion-spinner> Cargando IA...</p>
          </ion-text>

          <!-- BOTÓN PARA INICIAR RECONOCIMIENTO -->
          <ion-button 
            type="button" 
            expand="block" 
            color="success" 
            class="main-btn" 
            (click)="iniciarReconocimiento()" 
            [disabled]="cargandoModelos || mostrandoCamara"
            style="margin-bottom: 25px; font-weight: bold;">
            <ion-icon name="scan-outline" slot="start"></ion-icon>
            Ingresar con Rostro
          </ion-button>

          <div class="divider">Ingreso manual (Pausado)</div>

          <ion-item lines="none" class="custom-input">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <!-- Eliminado [disabled] de aquí -->
            <ion-input formControlName="email" type="email" placeholder="Correo"></ion-input>
          </ion-item>

          <ion-item lines="none" class="custom-input">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <!-- Eliminado [disabled] de aquí -->
            <ion-input formControlName="password" type="password" placeholder="Contraseña"></ion-input>
          </ion-item>

        </ion-card-content>
      </ion-card>
    </form>
  </div>
</ion-content>
